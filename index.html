<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Studio — SSIM 自動切版</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Layout Studio</h1>
    <p class="subtitle">用 SSIM（Structural Similarity）把素材依示意圖自動定位成切版</p>
  </header>

  <main class="app">
    <section class="uploads">
      <label class="upload-card">
        <span class="upload-title">① 示意圖</span>
        <span class="upload-desc">整體版面長相（layout reference），上傳後直接顯示在畫布</span>
        <input type="file" id="refInput" accept="image/*" />
        <span class="file-name" id="refName">未選擇</span>
      </label>

      <label class="upload-card">
        <span class="upload-title">② 素材資料夾</span>
        <span class="upload-desc">需包含 bg.png 底圖與要擺放的圖片</span>
        <input type="file" id="folderInput" webkitdirectory directory multiple />
        <span class="fallback">Firefox 不支援資料夾?改
          <label class="link">選多張圖片<input type="file" id="filesInput" accept="image/*" multiple hidden /></label>
          (記得含 bg.png)
        </span>
        <span class="file-name" id="folderName">未選擇</span>
      </label>
    </section>

    <div class="controls">
      <span class="step-title">③ 定位</span>
      <button id="autoPlaceBtn" class="primary-btn small" disabled>SSIM 自動定位</button>
      <label class="check"><input type="checkbox" id="showRefToggle" checked /> 顯示示意圖</label>
      <label class="slider">示意圖透明度
        <input type="range" id="refOpacity" min="0" max="100" value="100" />
        <span id="refOpacityVal">100%</span>
      </label>
      <span class="ai-group">
        <input type="password" id="geminiKey" placeholder="Gemini API key" autocomplete="off" />
        <select id="geminiModel" title="Gemini 模型">
          <option value="gemini-2.5-flash">gemini-2.5-flash</option>
          <option value="gemini-2.5-pro">gemini-2.5-pro</option>
        </select>
        <button id="aiFixBtn" class="primary-btn small" disabled title="在左側素材清單點選（可 Shift 多選）定位錯誤的素材後，交給 Gemini 重新定位">AI 重新定位</button>
        <button id="aiCheckBtn" class="primary-btn small" disabled title="讓 Gemini 掃描全部素材位置，列出疑似錯位的建議，逐項確認後套用">AI 全面檢查</button>
      </span>
      <span class="ctrl-hint">定位後可拖曳微調；降低示意圖透明度即可看清素材是否對齊</span>
      <span id="status" class="status"></span>
    </div>

    <div class="stage">
      <aside class="layers">
        <h3>素材</h3>
        <ul id="layerList" class="layer-list"></ul>
      </aside>
      <div class="canvas-wrap">
        <canvas id="canvas" hidden></canvas>
        <div id="viewport" class="viewport">
          <div id="board" class="board">
            <img id="boardBg" class="board-bg" alt="" draggable="false" />
            <img id="boardRef" class="board-ref" alt="" draggable="false" />
            <div id="assetLayer" class="asset-layer"></div>
            <div id="guideLayer" class="guide-layer"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="actionbar">
      <span class="foot-hint">可在畫布上拖曳微調位置，確認後再下載</span>
      <span id="saveStatus" class="save-status"></span>
      <button id="resetBtn" class="ghost-btn" title="清空示意圖、素材與畫布，並刪除自動存檔">↺ 重新開始</button>
      <button id="downloadBtn" class="success-btn" disabled>⬇ 下載切版 (HTML / CSS / JS)</button>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
